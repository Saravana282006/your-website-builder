name: Build and deploy to docs

# Publishes static files into /docs so GitHub Pages "Deploy from branch → /docs" works
# without Jekyll. Skips when only docs/ changed (deploy bot commit) to avoid loops.

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-docs
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
      - name: SPA fallback (client-side routes on GitHub Pages)
        run: cp dist/index.html dist/404.html
      - name: Push dist to docs/ on main
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: main
          target-folder: docs
          clean: true
          commit-message: "chore: deploy site to docs [skip ci]"
